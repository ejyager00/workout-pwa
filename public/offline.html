<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>You're offline</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #f9fafb;
      color: #111827;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1.5rem;
      padding: 2rem;
      text-align: center;
    }
    svg { color: #4f46e5; }
    h1 { font-size: 1.5rem; font-weight: 700; }
    p { color: #6b7280; max-width: 28rem; line-height: 1.6; }
    button {
      background: #4f46e5;
      color: #fff;
      border: none;
      padding: 0.625rem 1.5rem;
      border-radius: 0.375rem;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
    }
    button:hover { background: #4338ca; }
  </style>
</head>
<body>
  <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" fill="none"
       viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
    <path stroke-linecap="round" stroke-linejoin="round"
          d="M3 3l18 18M9.34 9.34A5 5 0 0 0 12 17a5 5 0 0 0 5-5 5 5 0 0 0-.34-1.83M6.23 6.23A9 9 0 0 0 3.05 12c1.24 3.49 4.57 6 8.95 6 1.8 0 3.48-.52 4.9-1.42M12 3c4.38 0 7.71 2.51 8.95 6a9.02 9.02 0 0 1-1.18 2.59" />
  </svg>
  <h1>You're offline</h1>
  <p>It looks like you've lost your internet connection. Check your connection and try again.</p>
  <button onclick="location.reload()">Try again</button>
</body>
</html>
